name: checks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --no-progress

      - name: Check autoload
        run: composer dump-autoload --dry-run --optimize --strict-psr --strict-ambiguous

  style:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
      - name: Install dependencies
        run: composer install --no-progress
      - name: Run style fixer
        run: composer run-script cs | tee cs.txt
      - name: Upload cs report
        uses: actions/upload-artifact@v4
        with:
          name: cs-report
          path: cs.txt

  static-analysis:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
      - name: Install dependencies
        run: composer install --no-progress
      - name: Run psalm
        run: composer run-script sca | tee psalm.txt
      - name: Upload psalm report
        uses: actions/upload-artifact@v4
        with:
          name: psalm-report
          path: psalm.txt

  tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
      - name: Install dependencies
        run: composer install --no-progress
      - name: Run tests
        run: composer run-script test -- --log-junit report.xml
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml

  type-coverage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
      - name: Install dependencies
        run: composer install --no-progress
      - name: Run type coverage
        run: composer run-script type | tee type-coverage.txt
      - name: Upload type coverage report
        uses: actions/upload-artifact@v4
        with:
          name: type-coverage-report
          path: type-coverage.txt

  test-coverage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov
      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
      - name: Install dependencies
        run: composer install --no-progress
      - name: Run test coverage
        run: composer run-script coverage | tee test-coverage.txt
      - name: Upload test coverage report
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: test-coverage.txt

  mutate:
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: [Array, Base, Bool, DateTime, Decimal, Float, Integer, String, Undefined]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl
          coverage: pcov
      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
      - name: Install dependencies
        run: composer install --no-progress
      - name: Run mutation tests for ${{ matrix.folder }}
        run: ./vendor/bin/pest tests/Unit/${{ matrix.folder }} --mutate --covered-only --parallel --min=100 | tee mutation-${{ matrix.folder }}.txt
      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-${{ matrix.folder }}-report
          path: mutation-${{ matrix.folder }}.txt

  badge:
    needs: [tests, style, static-analysis, type-coverage, test-coverage, mutate]
    if: always() && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get test count
        id: test_count
        run: |
          # Extract the 'tests' attribute from the first <testsuite> tag in the JUnit XML
          COUNT=$(grep -oP 'tests="\K[^"]+' artifacts/test-report/report.xml | head -1)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Check psalm
        id: psalm
        run: |
          if grep -q "No errors found!" artifacts/psalm-report/psalm.txt; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "color=green" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Check cs-fixer
        id: cs_fixer
        run: |
          if grep -q "Fixed 0 of" artifacts/cs-report/cs.txt; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "color=green" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Get type coverage
        id: type_coverage
        run: |
          VAL=$(grep -oP 'Total: \K[0-9.]+' artifacts/type-coverage-report/type-coverage.txt | head -1)
          echo "value=$VAL" >> $GITHUB_OUTPUT

      - name: Get test coverage
        id: test_coverage
        run: |
          VAL=$(grep -oP 'Total: \K[0-9.]+' artifacts/test-coverage-report/test-coverage.txt | head -1)
          echo "value=$VAL" >> $GITHUB_OUTPUT

      - name: Get mutation count
        id: mutation_count
        run: |
          if [ "${{ needs.mutate.result }}" != "success" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "value=failed" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "value=100%" >> $GITHUB_OUTPUT
            echo "color=green" >> $GITHUB_OUTPUT
          fi

      - name: Create Tests Count badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 75977b7515de20d7382f6855d44a1d97
          filename: tests_count.json
          label: "tests"
          message: ${{ steps.test_count.outputs.count }}
          color: green

      - name: Create Psalm badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 75977b7515de20d7382f6855d44a1d97
          filename: psalm.json
          label: "psalm"
          message: ${{ steps.psalm.outputs.status }}
          color: ${{ steps.psalm.outputs.color }}

      - name: Create CS Fixer badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 75977b7515de20d7382f6855d44a1d97
          filename: cs_fixer.json
          label: "cs-fixer"
          message: ${{ steps.cs_fixer.outputs.status }}
          color: ${{ steps.cs_fixer.outputs.color }}

      - name: Create Type Coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 75977b7515de20d7382f6855d44a1d97
          filename: types.json
          label: "types"
          message: ${{ steps.type_coverage.outputs.value }}%
          color: green

      - name: Create Test Coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 75977b7515de20d7382f6855d44a1d97
          filename: coverage.json
          label: "coverage"
          message: ${{ steps.test_coverage.outputs.value }}%
          color: green

      - name: Create Mutation badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 75977b7515de20d7382f6855d44a1d97
          filename: mutations.json
          label: "mutations"
          message: ${{ steps.mutation_count.outputs.value }}
          color: ${{ steps.mutation_count.outputs.color }}